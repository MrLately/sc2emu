name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe desired behavior and UI/UX flow
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety impact
      description: How could this affect flight safety, command flow, or failure modes?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
